# Pre-commit hooks for AniShift.
# Install once after `uv sync`:
#   uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
#
# pre-commit stage: fast, blocks the commit if ruff fails.
# commit-msg stage: enforces Conventional Commits message format.

minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        name: ruff check (auto-fix)
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: no-test-prose
        name: no docstrings/comments in tests
        entry: python scripts/hooks/check_test_comments.py
        language: system
        files: (^tests/|/tests/).*(test_.*|.*\.test|.*\.spec)\.(py|ts|tsx|js|jsx)$
        stages: [pre-commit]
      - id: const-docstrings
        name: docstring under every constant
        entry: python scripts/hooks/check_const_docstrings.py
        language: system
        files: ^anishift/.*\.py$
        stages: [pre-commit]
      - id: conventional-commit
        name: conventional commit message
        entry: python scripts/hooks/check_commit_msg.py
        language: system
        stages: [commit-msg]
      - id: mypy
        name: mypy (pre-push)
        entry: uv run mypy anishift/ tests/
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest (pre-push)
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
