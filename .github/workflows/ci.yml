name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --group dev
      - run: uv run ruff check anishift/ tests/
      - run: uv run ruff format --check anishift/ tests/
      - name: No docstrings/comments in tests
        run: uv run python scripts/hooks/check_test_comments.py $(git ls-files 'tests/**/test_*.py' 'anishift/**/test_*.py')

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --group dev
      - run: uv run mypy anishift/ tests/

  test:
    name: Test (pytest) [ubuntu-latest]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Windows off the matrix: local pre-push pytest covers OS bugs, GHA Windows = 2x minutes.
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --group dev
      - run: uv run pytest
